{% extends "boutique/base.html" %}

{% block title %}Supprimer — Cozy Wardrobe{% endblock %}

{% block content %}
<div class="confirm-page">
    <div class="confirm-card">
        <h1>Confirmer la suppression</h1>
        <div class="article-name">{{ article.designation }}</div>
        <div class="article-info">{{ article.prix_unitaire }} € — {{ article.quantite_disponible }} en stock</div>
        <div class="confirm-actions">
            <form method="post" style="display:inline;">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Supprimer</button>
            </form>
            <a href="{% url 'gestion_articles' %}" class="btn btn-outline">Annuler</a>
        </div>
    </div>
</div>
{% endblock %}
