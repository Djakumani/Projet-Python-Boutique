{% extends "boutique/base.html" %}

{% block title %}Connexion - Cozy Wardrobe{% endblock %}

{% block content %}
<div class="form-page">
    <h1>Connexion</h1>
    <div class="form-card">
        {% if form.errors %}
            <div class="form-error">Nom d'utilisateur ou mot de passe incorrect.</div>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_username">Nom d'utilisateur</label>
                <input type="text" name="username" id="id_username" value="{{ form.username.value|default:'' }}" required autofocus>
            </div>
            <div class="form-group">
                <label for="id_password">Mot de passe</label>
                <input type="password" name="password" id="id_password" required>
            </div>
            {% if next %}
                <input type="hidden" name="next" value="{{ next }}">
            {% endif %}
            <div class="form-submit">
                <button type="submit" class="btn btn-primary">Se connecter</button>
            </div>
        </form>
    </div>
    <div class="form-footer">
        Pas encore de compte ? <a href="{% url 'inscription' %}">Creer un compte</a>
    </div>
</div>
{% endblock %}
